    <form action="/submit-order" method="post">
      <h1>form</h1>
      <label for="coffee">กรอกกาแฟของคุณ</label>
      <input
        id="coffee"
        type="text"
        placeholder="ใส่กาแฟที่คุณชอบ"
        name="value"
      />
      <div>
        <label for="mesi">Mesi</label>
        <input type="radio" name="player" id="mesi" value="Mesi" />
        <label for="ronal">Ronal</label>
        <input type="radio" name="player" id="ronal" value="Ronal" />
      </div>

      <div>
        <h2>เลือกของที่จะใส่เพิ่มเติม</h2>
        <label for="khaidao"
          >ไข่ดาว
          <input type="checkbox" id="khaidao" name="extra" value="ไข่ดาว" />
        </label>
        <label for="extrafood"
          >พิเศษ
          <input type="checkbox" id="extrafood" name="extra" value="พิเศษ" />
        </label>
        <label for="soup"
          >ซุปน้ำดำ
          <input type="checkbox" id="soup" name="extra" value="ซุป" />
        </label>
      </div>
      <button type="submit">submit</button>
    </form>

    <form action="https://www.google.com/search" method="get">
      <input type="text" name="q" />
      <label for="size">เลือก Size </label>
      <select name="" id="size">
        <option value="big">จานใหญ่</option>
        <option value="medium">จานกลาง</option>
        <option value="small">จานเล็ก</option>
      </select>
    </form>
